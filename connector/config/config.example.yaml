supabase:
  url: "https://SEU-PROJETO.supabase.co"
  # Use service_role key (não a anon key) para bypass de RLS
  service_role_key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

connector:
  id: "connector-bancada-01"
  org_id: "zenite-tech"
  poll_interval_seconds: 30       # Intervalo de polling por câmera
  heartbeat_interval_seconds: 60  # Intervalo de heartbeat
  max_events_per_poll: 50         # Máximo de eventos por requisição
  image_upload: true              # Fazer upload de imagens para Storage
  log_level: "INFO"               # DEBUG, INFO, WARNING, ERROR

